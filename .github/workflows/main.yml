name: Build Android APK

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4   # ✅ updated

      - name: Setup Node
        uses: actions/setup-node@v4   # ✅ updated
        with:
          node-version: 18

      - name: Install deps
        run: npm install -g jetifier

      - name: Setup JDK
        uses: actions/setup-java@v4   # ✅ updated
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4   # ✅ FIXED (important)
        with:
          name: app-release
          path: android/app/build/outputs/apk/release/app-release.apk
